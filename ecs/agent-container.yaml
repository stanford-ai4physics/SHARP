family: agent-container
networkMode: bridge
requiresCompatibilities:
  - EC2
executionRoleArn: arn:aws:iam::${AWS_ACCOUNT_ID}:role/ECSTaskExecutionRole
taskRoleArn: arn:aws:iam::${AWS_ACCOUNT_ID}:role/ECSTaskRole
containerDefinitions:
  - name: researcher
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.us-west-1.amazonaws.com/agent-image:latest
    essential: true
    command:
      - "/usr/local/bin/entrypoint.sh"
      - "/bin/sh"
      - "-c"
      - "echo 'container initialized' && tail -f /dev/null"
    cpu: 2048 # 2 vCPUs (t3.small)
    memory: 1800 # ~2 GB (t3.small, minus ECS agent overhead)
    portMappings:
      - containerPort: 22
        hostPort: 2222
        protocol: tcp
    # --- SSH access ---
    # Set SSH_PUBKEY when running the task (via --overrides) to enable SSH.
    # See README.md for details.
    environment:
      - name: SSH_PUBKEY
        value: ""
    # --- GPU support ---
    # To enable GPU, uncomment the block below and use a GPU instance
    # (e.g., g4dn.xlarge). Also adjust cpu/memory to match the instance.
    # See README.md for details.
    # resourceRequirements:
    #   - type: GPU
    #     value: "1"
    logConfiguration:
      logDriver: awslogs
      options:
        awslogs-group: /ecs/agent-container
        awslogs-region: us-west-1
        awslogs-stream-prefix: researcher
    linuxParameters:
      initProcessEnabled: true

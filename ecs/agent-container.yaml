family: agent-container
networkMode: awsvpc
requiresCompatibilities:
  - FARGATE
# enableExecuteCommand: true
cpu: "256" # 0.25 vCPU
memory: "512" # 0.5 GB
executionRoleArn: arn:aws:iam::${AWS_ACCOUNT_ID}:role/ECSTaskExecutionRole
taskRoleArn: arn:aws:iam::${AWS_ACCOUNT_ID}:role/ECSTaskRole
containerDefinitions:
  - name: researcher
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.eu-central-1.amazonaws.com/agent-image:latest
    essential: true
    command: ["/bin/sh", "-c", "echo 'container initialized' && tail -f /dev/null"]
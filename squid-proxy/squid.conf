# Squid proxy for domain whitelisting
# Used on HPC/Shifter where iptables is unavailable

http_port 3128

# Disable caching
cache deny all

# Logging to stderr for container visibility
access_log stdio:/dev/stderr
cache_log /tmp/squid-cache.log
coredump_dir /tmp
pid_filename /tmp/squid.pid

# Port ACLs
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# --- Domain whitelist (mirrors init-firewall.sh) ---

# AI / agent
acl allowed_domains dstdomain .anthropic.com
acl allowed_domains dstdomain .claude.com
acl allowed_domains dstdomain .sentry.io
acl allowed_domains dstdomain .statsig.com

# GitHub
acl allowed_domains dstdomain .github.com
acl allowed_domains dstdomain .githubusercontent.com

# Package managers
acl allowed_domains dstdomain .npmjs.org
acl allowed_domains dstdomain .pypi.org
acl allowed_domains dstdomain .pythonhosted.org
acl allowed_domains dstdomain .anaconda.com
acl allowed_domains dstdomain .anaconda.org
acl allowed_domains dstdomain .pytorch.org

# VS Code
acl allowed_domains dstdomain .visualstudio.com
acl allowed_domains dstdomain .windows.net
acl allowed_domains dstdomain .vscode-cdn.net

# Physics / HEP
acl allowed_domains dstdomain .arxiv.org
acl allowed_domains dstdomain .inspirehep.net
acl allowed_domains dstdomain .hepdata.net
acl allowed_domains dstdomain .zenodo.org
acl allowed_domains dstdomain .cern.ch
acl allowed_domains dstdomain .cern
acl allowed_domains dstdomain .harvard.edu
acl allowed_domains dstdomain .sdss.org
acl allowed_domains dstdomain .scikit-hep.org
acl allowed_domains dstdomain root.cern
acl allowed_domains dstdomain root.cern.ch

# Scientific Python
acl allowed_domains dstdomain .scipy.org
acl allowed_domains dstdomain .numpy.org
acl allowed_domains dstdomain .matplotlib.org

# Data / storage
acl allowed_domains dstdomain .doi.org
acl allowed_domains dstdomain .docker.io
acl allowed_domains dstdomain .docker.com
acl allowed_domains dstdomain .huggingface.co
acl allowed_domains dstdomain .googleapis.com
acl allowed_domains dstdomain .amazonaws.com

# --- Access rules ---
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow allowed_domains
http_access deny all
